site_name: FastAPI BaseKit
site_description: Toolkit base para desarrollo rápido de APIs con FastAPI
site_url: https://mundobien2025.github.io/fastapi-basekit
repo_url: https://github.com/mundobien2025/fastapi-basekit
repo_name: fastapi-basekit
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  custom_dir: docs/overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - announce.dismiss

  logo: assets/logo-mark.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.tilde
  - footnotes

nav:
  - Inicio: index.md
  - Primeros Pasos:
    - Instalación: getting-started/installation.md
    - Configuración: getting-started/configuration.md
    - Primer CRUD: getting-started/first-crud.md
  
  - Guía de Usuario:
    - Controllers: user-guide/controllers.md
    - Services: user-guide/services.md
    - Repositories: user-guide/repositories.md
    - Paginación: user-guide/pagination.md
    - Filtrado: user-guide/filtering.md
    - Ordenamiento: user-guide/ordering.md
    - Búsqueda: user-guide/search.md
    - Validación: user-guide/validation.md
  
  - Avanzado:
    - Permisos Personalizados: advanced/permissions.md
    - Soft Deletes: advanced/soft-deletes.md
    - Logging: advanced/logging.md
    - Configuración Global: advanced/configuration.md
    - Performance: advanced/performance.md
  
  - Referencia API:
    - BaseController: api-reference/base-controller.md
    - SQLAlchemyBaseController: api-reference/sqlalchemy-controller.md
    - BaseService: api-reference/base-service.md
    - BaseRepository: api-reference/base-repository.md
    - Schemas: api-reference/schemas.md
    - Excepciones: api-reference/exceptions.md
  
  - Ejemplos:
    - CRUD Básico: examples/basic-crud.md
    - Filtros Complejos: examples/complex-filters.md
    - Relaciones: examples/relationships.md
    - Autenticación: examples/authentication.md
  
  - Contribuir:
    - Guía de Contribución: contributing.md
    - Desarrollo: development.md
  
  - Changelog: changelog.md

extra:
  version_label: 0.3.x
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mundobien2025/fastapi-basekit
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fastapi-basekit/
      name: PyPI
  generator: false

  version:
    provider: mike
    default: latest

  status:
    new: Recently added
    deprecated: Deprecated

extra_css:
  - assets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js

